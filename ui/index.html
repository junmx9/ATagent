<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATAgent Console</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">ATAgent</p>
          <h1>配置控制台</h1>
          <p class="subtle">动作定义、AI 设置、调试执行和访问令牌都集中在这里。</p>
          <div class="hero-actions">
            <button id="open-ai-settings" type="button" class="hero-btn">AI 设置</button>
            <button id="reload-data" type="button" class="ghost">重新加载</button>
          </div>
        </div>
        <div class="hero-side">
          <div class="badge">开发期工具</div>
          <label class="hero-token">
            <span>API Token</span>
            <input id="api-access-token" type="password" placeholder="可选，服务端启用鉴权时填写" />
          </label>
        </div>
      </header>

      <div id="ai-settings-modal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
          <div class="modal-head">
            <h2>AI 设置</h2>
            <button id="close-ai-settings" type="button" class="close-btn">×</button>
          </div>
          <form id="settings-form" class="form-grid compact">
            <label class="full">
              <span>Base URL</span>
              <input id="ai-base-url" type="text" placeholder="https://api.openai.com/v1" />
            </label>
            <label class="full">
              <span>API Key</span>
              <input id="ai-api-key" type="password" />
            </label>
            <label>
              <span>Model</span>
              <input id="ai-model" type="text" />
            </label>
            <label>
              <span>Max Tokens</span>
              <input id="ai-max-tokens" type="number" min="1" />
            </label>
            <label>
              <span>Temperature</span>
              <input id="ai-temperature" type="number" step="0.1" min="0" max="2" />
            </label>
            <label>
              <span>Timeout (ms)</span>
              <input id="ai-timeout-ms" type="number" min="1" />
            </label>
            <label>
              <span>Max Retries</span>
              <input id="ai-max-retries" type="number" min="0" />
            </label>
            <label class="toggle">
              <span>允许启发式回退</span>
              <input id="ai-allow-fallback" type="checkbox" />
            </label>
            <label class="full">
              <span>System Prompt</span>
              <textarea id="ai-system-prompt" rows="4"></textarea>
            </label>
          </form>
          <div class="modal-foot">
            <button id="save-settings" type="button">保存设置</button>
          </div>
        </div>
      </div>

      <main class="layout">
        <section class="panel actions-panel">
          <div class="panel-head">
            <h2>动作配置</h2>
            <div class="actions">
              <button id="add-action" type="button">新增</button>
              <button id="delete-action" type="button" class="ghost">删除</button>
            </div>
          </div>
          <div class="panel-body split">
            <aside>
              <ul id="action-list" class="action-list"></ul>
            </aside>
            <form id="action-form" class="form-grid">
              <label>
                <span>配置版本</span>
                <input id="config-version" type="text" />
              </label>
              <label>
                <span>动作名</span>
                <input id="action-name" type="text" />
              </label>
              <label>
                <span>描述</span>
                <input id="action-description" type="text" />
              </label>
              <label>
                <span>权限</span>
                <select id="action-permission">
                  <option value="normal">normal</option>
                  <option value="confirm">confirm</option>
                  <option value="admin">admin</option>
                </select>
              </label>
              <label class="toggle">
                <span>启用</span>
                <input id="action-enabled" type="checkbox" checked />
              </label>
              <label>
                <span>标签（逗号分隔）</span>
                <input id="action-tags" type="text" />
              </label>
              <label class="full">
                <span>示例（每行一条）</span>
                <textarea id="action-examples" rows="4"></textarea>
              </label>
              <label class="full">
                <span>成功消息模板</span>
                <input id="message-success" type="text" />
              </label>
              <label class="full">
                <span>确认消息模板</span>
                <input id="message-confirm" type="text" />
              </label>
              <label class="full">
                <span>参数定义 JSON</span>
                <textarea id="action-parameters" rows="8"></textarea>
              </label>
              <label class="full">
                <span>缓存配置 JSON</span>
                <textarea id="action-cache" rows="4" placeholder="{&quot;ttlMs&quot;:60000,&quot;contextKeys&quot;:[&quot;userId&quot;]}"></textarea>
              </label>
              <label class="full">
                <span>Workflow 配置 JSON</span>
                <textarea id="action-workflow" rows="10" placeholder="{&quot;steps&quot;:[]}"></textarea>
              </label>
            </form>
          </div>
          <div class="panel-foot">
            <label class="file-label">
              <input id="import-actions" type="file" accept="application/json" />
              导入
            </label>
            <button id="export-actions" type="button" class="ghost">导出</button>
            <button id="save-actions" type="button">保存动作配置</button>
          </div>
        </section>

        <section class="panel playground-panel">
          <div class="panel-head">
            <h2>执行调试</h2>
          </div>
          <div class="form-grid compact">
            <label class="full">
              <span>输入</span>
              <textarea id="play-input" rows="4" placeholder="添加待办 明天开会"></textarea>
            </label>
            <label>
              <span>Session ID</span>
              <input id="play-session" type="text" />
            </label>
            <label class="full">
              <span>Context JSON</span>
              <textarea id="play-context" rows="4">{}</textarea>
            </label>
          </div>
          <div class="panel-foot">
            <button id="execute" type="button">执行</button>
            <button id="continue" type="button" class="ghost">继续</button>
            <button id="confirm" type="button" class="ghost">确认上次操作</button>
          </div>
          <pre id="play-output" class="output"></pre>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
